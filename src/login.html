<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gym Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      
      background-color: #ffffff;
      background-image:
        radial-gradient(circle at 10% 10%, rgba(246, 172, 122, 0.6) 0%, transparent 45%),
        radial-gradient(circle at 15% 95%, rgba(135, 142, 235, 0.6) 0%, transparent 55%),
        radial-gradient(circle at 60% 60%, rgba(209, 168, 185, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 90% 10%, rgba(255, 255, 255, 1) 0%, transparent 40%);
      
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      display: flex;
      width: 100%;
      max-width: 1100px;
      height: 600px;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      gap: 60px;
    }

    /* ── PAINEL ESQUERDO ── */
    .brand-panel {
      position: relative;
      width: 55%;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      display: flex;
      align-items: flex-end;
      padding: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }

    .brand-panel h1 {
      font-size: 80px;
      font-weight: 800;
      color: #ffffff;
      line-height: 0.95;
      letter-spacing: -1px;
      /* Sombra para dar profundidade e destaque contra o fundo claro */
      text-shadow: 3px 6px 16px rgba(0, 0, 0, 0.15);
    }

    /* ── PAINEL DIREITO ── */
    .form-panel {
      width: 340px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #555555;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      height: 40px;
      background: #ffffff;
      border: 1px solid #e2e2e2;
      border-radius: 6px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input:focus {
      border-color: #878eeb;
      box-shadow: 0 0 0 3px rgba(135, 142, 235, 0.15);
    }

    .btn-login {
      width: 100%;
      height: 44px;
      background: linear-gradient(90deg, #e49864 0%, #5d67c5 100%);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    /* ── RESPONSIVIDADE ── */
    @media (max-width: 900px) {
      body { overflow-y: auto; }
      .login-wrapper {
        flex-direction: column;
        justify-content: center;
        height: auto;
        padding: 40px 20px;
      }
      .brand-panel {
        width: 100%;
        height: 350px;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }
      .brand-panel h1 {
        font-size: 56px;
        text-align: center;
      }
      .form-panel {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    
    <div class="brand-panel">
      <h1>GYM<br>MANAGER</h1>
    </div>

    <div class="form-panel">
      <form onsubmit="event.preventDefault(); window.location.href='pages/dashboard-alunos.html';">
        
        <div class="input-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" value="admin" required />
        </div>
        
        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" value="123456" required />
        </div>

        <button type="submit" class="btn-login">Entrar</button>
        
      </form>
    </div>

  </div>

</body>
</html>
