<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dash_Alunos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F4F3EF;
      --surface:   #FFFFFF;
      --border:    #E2E0D8;
      --text:      #1A1918;
      --muted:     #7A786F;
      --accent:    #3B3A96;
      --ativo-bg:  #CECBF6;
      --ativo-tx:  #3C3489;
      --inativo-bg:#F5C4B3;
      --inativo-tx:#712B13;
      --sidebar-w: 56px;
      --topbar-h:  38px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
